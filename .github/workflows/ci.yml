name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://devtrack:devtrack@localhost:5432/devtrack
      - run: npm run typecheck
      - run: npm test -- --runInBand
      - run: npm run build

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --runInBand
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [server, client]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  deploy:
    runs-on: ubuntu-latest
    needs: [server, client, docker-build]
    if: github.ref == 'refs/heads/main' && false
    steps:
      - uses: actions/checkout@v4
      - run: npx vercel --token=$VERCEL_TOKEN --prod --cwd client --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - run: curl -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
